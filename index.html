<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bean Blaster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="flex flex-col items-center px-4 py-14 gap-6">

  <!-- Header -->
  <header class="text-center max-w-sm w-full">
    <h1 class="text-2xl font-semibold tracking-tight text-stone-900">Bean Blaster</h1>
    <p class="text-sm text-stone-400 mt-1.5">Enter coordinates to get dispenser fill amounts.</p>
  </header>

  <!-- Machine Coords -->
  <section class="card w-full max-w-sm p-5">
    <div class="section-label">Machine coordinates <span style="font-weight:400;letter-spacing:0;text-transform:none;font-size:0.65rem;color:#c4bfb8;">(magma block coords)</span></div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label>Machine X</label>
        <input id="machX" type="number" class="input-field" placeholder="e.g. 100" />
      </div>
      <div>
        <label>Machine Z</label>
        <input id="machZ" type="number" class="input-field" placeholder="e.g. 200" />
      </div>
    </div>
  </section>

  <!-- Target + Button -->
  <section class="card w-full max-w-sm p-5">
    <div class="section-label">Target location</div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label>Target X</label>
        <input id="tgtX" type="number" class="input-field" placeholder="e.g. 350" />
      </div>
      <div>
        <label>Target Z</label>
        <input id="tgtZ" type="number" class="input-field" placeholder="e.g. 180" />
      </div>
    </div>
  </section>

  <!-- Result -->
  <section id="result" class="w-full max-w-sm hidden"></section>

  <!-- Footer -->
  <footer class="mt-2 pb-4 flex gap-5 items-center">
    <a href="https://www.planetminecraft.com/project/bean-blaster/" target="_blank" rel="noopener"
       class="text-xs text-stone-400 hover:text-stone-600 transition-colors underline"
       style="font-family:'JetBrains Mono',monospace;">Bean blaster download</a>
    <span class="text-stone-300" style="font-size:0.6rem;">·</span>
    <a href="https://github.com/Tems-py/beanblaster-website" target="_blank" rel="noopener"
       class="text-xs text-stone-400 hover:text-stone-600 transition-colors underline"
       style="font-family:'JetBrains Mono',monospace;">source</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
